<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Neon Violet Gradient -->
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Neon Cyan Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <!-- Red Laser Glow Filter -->
    <filter id="laserGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Scanner Glow -->
    <filter id="neonGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Solid background (important for maskable icons on Android) -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Scanning Frame / Visor -->
  <rect x="76" y="76" width="360" height="360" rx="32" fill="none" stroke="url(#violetGrad)" stroke-width="12" opacity="0.8" filter="url(#neonGlow)" />
  
  <!-- Visor Corners (Thicker) -->
  <path d="M 116 76 L 76 76 L 76 116" fill="none" stroke="#a78bfa" stroke-width="16" stroke-linecap="round" />
  <path d="M 396 76 L 436 76 L 436 116" fill="none" stroke="#a78bfa" stroke-width="16" stroke-linecap="round" />
  <path d="M 76 396 L 76 436 L 116 436" fill="none" stroke="#a78bfa" stroke-width="16" stroke-linecap="round" />
  <path d="M 436 396 L 436 436 L 396 436" fill="none" stroke="#a78bfa" stroke-width="16" stroke-linecap="round" />

  <!-- Barcode Pattern (Neon Cyan) -->
  <g fill="url(#cyanGrad)">
    <rect x="120" y="160" width="16" height="150" rx="4" />
    <rect x="146" y="160" width="8" height="150" rx="2" />
    <rect x="164" y="160" width="24" height="150" rx="6" />
    <rect x="200" y="160" width="12" height="150" rx="3" />
    <rect x="222" y="160" width="28" height="150" rx="6" />
    <rect x="260" y="160" width="8" height="150" rx="2" />
    <rect x="278" y="160" width="16" height="150" rx="4" />
    <rect x="304" y="160" width="32" height="150" rx="8" />
    <rect x="346" y="160" width="8" height="150" rx="2" />
    <rect x="364" y="160" width="20" height="150" rx="5" />
    <rect x="394" y="160" width="12" height="150" rx="3" />
  </g>

  <!-- Shopping Cart Overlay (Vibrant Accent) -->
  <g fill="none" stroke="#f472b6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" filter="url(#neonGlow)">
    <circle cx="190" cy="380" r="16" fill="#f472b6" />
    <circle cx="330" cy="380" r="16" fill="#f472b6" />
    <path d="M 130 180 L 155 180 L 180 320 L 340 320 L 370 200 L 160 200" />
  </g>

  <!-- Pulsing Red Laser Line (Horizontal Center) -->
  <line x1="60" y1="235" x2="452" y2="235" stroke="#f43f5e" stroke-width="8" stroke-linecap="round" filter="url(#laserGlow)" />
</svg>
